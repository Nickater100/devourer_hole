<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Angry Ball</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <!-- Settings Dropdown (top-right) -->
            <div id="settings-dropdown" class="settings-dropdown">
                <button id="settings-toggle-btn" class="settings-toggle-btn" aria-label="Settings">⚙️</button>
                <div id="settings-menu" class="settings-menu">
                    <button id="login-btn" class="settings-menu-item">
                        Iniciar sesión con Google
                    </button>
                    <button id="delete-account-btn" class="settings-menu-item danger-item" style="display: none;">
                        Borrar Cuenta
                    </button>
                </div>
            </div>

            <h1>ANGRY<br><span>BALL</span></h1>
            <p>Trágate los bloques enemigos.<br>Protege la esfera interactiva.<br><span class="danger">Persiguen al
                    objetivo. ¡Defiéndelo!</span></p>
            <div class="stats-container">
                <div class="high-score-display"><span id="lbl-high-score">Mejor Puntaje</span>: <span id="start-high-score">0</span></div>
                <div class="coins-display">🪙 <span id="start-coins">0</span></div>
            </div>
            <div class="menu-buttons">
                <button id="start-btn">JUGAR</button>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button id="store-btn" class="secondary-btn" style="flex: 1;">TIENDA</button>
                    <button id="ranking-btn" class="secondary-btn" style="flex: 1;">RANKING</button>
                </div>
                <button id="rewarded-ad-btn" class="secondary-btn" style="width: 100%; margin-top: 5px; background: rgba(52, 152, 219, 0.2); border-color: rgba(52, 152, 219, 0.5);">
                    📹 +100 🪙
                </button>
            </div>
        </div>

        <!-- Store Screen -->
        <div id="store-screen" class="screen">
            <h1>LA TIENDA</h1>
            <div class="coins-display store-coins">🪙 <span id="store-total-coins">0</span></div>
            <div id="store-tabs" class="store-tabs"></div>
            <div class="store-items" id="store-items-container">
                <!-- Items will be injected here by game.js -->
            </div>
            <button id="close-store-btn" class="secondary-btn">VOLVER</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen">
            <h1 id="lbl-leaderboard-title">TOP 50 GLOBAL</h1>
            <div class="leaderboard-container">
                <ul id="leaderboard-list" class="leaderboard-list">
                    <li style="text-align: center; color: #a0a0a0;">Cargando...</li>
                </ul>
            </div>
            <button id="close-leaderboard-btn" class="secondary-btn">VOLVER</button>
        </div>

        <!-- Revive Screen -->
        <div id="revive-screen" class="screen">
            <h2 id="lbl-revive-title">¿Segunda Oportunidad?</h2>
            <p id="lbl-revive-desc">Mira un video para seguir jugando</p>
            <div id="revive-timer" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem;">5</div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <button id="revive-ad-btn" style="width: 100%; background: linear-gradient(45deg, #f39c12, #e67e22);">📹 REVIVIR</button>
                <button id="skip-revive-btn" class="secondary-btn" style="width: 100%;">No, gracias</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="screen">
            <div id="score-display"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h2>Fin del Juego</h2>
            <p id="death-reason">¡La esfera fue destruida!</p>
            <div class="score-board">
                <p id="final-score-container"></p>
                <p id="high-score-container" class="high-score-text"></p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <button id="restart-btn" style="width: 100%;">REINTENTAR</button>
                <button id="menu-btn" class="secondary-btn" style="width: 100%;">MENÚ</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="admob-bundle.js"></script>
    <script src="google-auth-bundle.js"></script>
    <script src="haptics-bundle.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script src="i18n.js"></script>
    <script src="game.js"></script>

</body>

</html>
