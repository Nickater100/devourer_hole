<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Angry Ball</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <!-- Header: Monedas y Ajustes -->
            <div class="top-header">
                <div class="header-left">
                    <div class="header-coins">🪙 <span id="start-coins">0</span></div>
                    <button id="rewarded-ad-btn" class="icon-btn-text">📹 +100 🪙</button>
                </div>
                <button id="settings-btn" class="icon-btn">⚙️</button>
            </div>

            <!-- Main Menu Panel -->
            <div class="main-menu-panel glass">
                <h1>ANGRY<br><span>BALL</span></h1>
                
                <div class="high-score-display">
                    <span id="lbl-high-score">Mejor</span>: <span id="start-high-score">0</span>
                </div>

                <div class="menu-actions">
                    <button id="start-btn" class="primary-btn">JUGAR</button>
                    
                    <button id="versus-btn" class="versus-btn-alt">⚔️ MODO VERSUS</button>
                    
                    <div class="secondary-actions">
                        <button id="store-btn" class="secondary-btn">🛒 TIENDA</button>
                        <button id="leaderboard-btn" class="secondary-btn">🏆 TOP</button>
                    </div>
                </div>

                <p class="start-hint">Trágate los bloques. Protege la esfera.</p>
            </div>
            
            <!-- Safe space for Ad Banner at the bottom -->
            <div class="ad-safe-zone"></div>
        </div>

        <!-- Settings Modal (Hidden by default) -->
        <div id="settings-modal" class="modal">
            <div class="modal-content glass">
                <h2 id="lbl-settings-title">AJUSTES</h2>
                <div id="user-profile">
                    <button id="login-btn" class="secondary-btn">Iniciar sesión con Google</button>
                    <button id="delete-account-btn" class="secondary-btn danger-text" style="display: none;">Borrar Cuenta</button>
                </div>
                <button id="close-settings-btn" class="secondary-btn">CERRAR</button>
            </div>
        </div>

        <!-- Store Screen -->
        <div id="store-screen" class="screen">
            <h1>LA TIENDA</h1>
            <div class="coins-display store-coins">🪙 <span id="store-total-coins">0</span></div>
            <div id="store-tabs" class="store-tabs"></div>
            <div class="store-items" id="store-items-container">
                <!-- Items will be injected here by game.js -->
            </div>
            <button id="close-store-btn" class="secondary-btn">VOLVER</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen">
            <h1 id="lbl-leaderboard-title">TOP 50 GLOBAL</h1>
            <div class="leaderboard-container">
                <ul id="leaderboard-list" class="leaderboard-list">
                    <li style="text-align: center; color: #a0a0a0;">Cargando...</li>
                </ul>
            </div>
            <button id="close-leaderboard-btn" class="secondary-btn">VOLVER</button>
        </div>

        <!-- Revive Screen -->
        <div id="revive-screen" class="screen">
            <h2 id="lbl-revive-title">¿Segunda Oportunidad?</h2>
            <p id="lbl-revive-desc">Mira un video para seguir jugando</p>
            <div id="revive-timer" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem;">5</div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <button id="revive-ad-btn" style="width: 100%; background: linear-gradient(45deg, #f39c12, #e67e22);">📹 REVIVIR</button>
                <button id="skip-revive-btn" class="secondary-btn" style="width: 100%;">No, gracias</button>
            </div>
        </div>

        <!-- Versus Matchmaking Screen -->
        <div id="versus-matchmaking-screen" class="screen">
            <h2 id="lbl-searching">Buscando oponente...</h2>
            <p id="lbl-versus-fee" style="color: #f1c40f;">Costo de entrada: 100 🪙</p>
            <div class="loader-container" style="margin: 2rem 0;">
                <div class="loader"></div>
            </div>
            <button id="versus-cancel-btn" class="secondary-btn">CANCELAR</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="screen">
            <div id="score-display"></div>
            <div id="opponent-info" style="display: none; position: absolute; top: 10px; right: 20px; text-align: right; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #4ecca3; z-index: 100;">
                <div id="opponent-name" style="font-weight: bold; font-size: 0.8rem; color: #fff;">---</div>
                <div id="opponent-status" style="font-size: 0.7rem; color: #4ecca3;">Oponente: VIVO</div>
                <div id="opponent-score" style="font-size: 1.2rem; font-weight: 900; color: #fff;">0</div>
            </div>

        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h2>Fin del Juego</h2>
            <p id="death-reason">¡La esfera fue destruida!</p>
            <div class="score-board">
                <p id="final-score-container"></p>
                <p id="high-score-container" class="high-score-text"></p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <button id="restart-btn" style="width: 100%;">REINTENTAR</button>
                <button id="menu-btn" class="secondary-btn" style="width: 100%;">MENÚ</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="admob-bundle.js"></script>
    <script src="google-auth-bundle.js"></script>
    <script src="haptics-bundle.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script src="i18n.js"></script>
    <script src="game.js"></script>

</body>

</html>
