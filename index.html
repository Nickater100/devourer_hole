<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Agujero Devorador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>EL AGUJERO<br><span>DEVORADOR</span></h1>
            <p>Trágate los bloques enemigos.<br>Protege la esfera interactiva.<br><span class="danger">Persiguen al
                    objetivo. ¡Defiéndelo!</span></p>
            <div class="stats-container">
                <div class="high-score-display"><span id="lbl-high-score">Mejor Puntaje</span>: <span id="start-high-score">0</span></div>
                <div class="coins-display">🪙 <span id="start-coins">0</span></div>
            </div>
            <div class="menu-buttons">
                <button id="start-btn">JUGAR</button>
                <button id="store-btn" class="secondary-btn">TIENDA</button>
            </div>
        </div>

        <!-- Store Screen -->
        <div id="store-screen" class="screen">
            <h1>LA TIENDA</h1>
            <div class="coins-display store-coins">🪙 <span id="store-total-coins">0</span></div>
            <div class="store-items" id="store-items-container">
                <!-- Items will be injected here by game.js -->
            </div>
            <button id="close-store-btn" class="secondary-btn">VOLVER</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="screen">
            <div id="score-display"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h2>Fin del Juego</h2>
            <p id="death-reason">¡La esfera fue destruida!</p>
            <div class="score-board">
                <p id="final-score-container"></p>
                <p id="high-score-container" class="high-score-text"></p>
            </div>
            <button id="restart-btn">REINTENTAR</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="i18n.js"></script>
    <script src="game.js"></script>

</body>

</html>
